{% extends 'layouts/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row">
    <div class="col col-md-4 mx-auto">
        <h1>Login</h1>
        <form action="{% url 'core:login' %}" method="POST">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-primary">Acceder</button>
        </form>
    </div>
</div>
{% endblock %}
